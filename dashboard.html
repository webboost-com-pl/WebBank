<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel klienta — WebBank</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 10%, rgba(56,189,248,.20), transparent 32%),
        radial-gradient(circle at 85% 20%, rgba(37,99,235,.18), transparent 30%),
        #050816;
      color: white;
    }

    .layout {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 270px 1fr;
    }

    .sidebar {
      padding: 28px;
      background: rgba(15, 23, 42, .74);
      border-right: 1px solid rgba(255,255,255,.08);
      backdrop-filter: blur(18px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 22px;
      font-weight: 850;
      margin-bottom: 42px;
    }

    .logo-mark {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      background: linear-gradient(135deg, #38bdf8, #2563eb);
      display: grid;
      place-items: center;
      box-shadow: 0 18px 42px rgba(37,99,235,.35);
    }

    .menu {
      display: grid;
      gap: 10px;
    }

    .menu a, .menu button {
      width: 100%;
      text-align: left;
      padding: 14px 16px;
      border-radius: 16px;
      text-decoration: none;
      border: 1px solid transparent;
      background: transparent;
      color: #94a3b8;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: .2s;
    }

    .menu a.active,
    .menu a:hover,
    .menu button:hover {
      background: rgba(56,189,248,.12);
      border-color: rgba(56,189,248,.18);
      color: white;
    }

    .main {
      padding: 30px;
      animation: enter .65s ease both;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 28px;
    }

    .topbar h1 {
      font-size: clamp(30px, 4vw, 48px);
      letter-spacing: -0.06em;
    }

    .user-pill {
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(15, 23, 42, .72);
      border: 1px solid rgba(255,255,255,.1);
      color: #cbd5e1;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 24px;
      align-items: start;
    }

    .card {
      border-radius: 28px;
      background: rgba(15, 23, 42, .70);
      border: 1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(20px);
      box-shadow: 0 30px 90px rgba(0,0,0,.32);
      padding: 26px;
    }

    .balance-card {
      min-height: 260px;
      background:
        radial-gradient(circle at top right, rgba(255,255,255,.22), transparent 28%),
        linear-gradient(135deg, #38bdf8, #2563eb 55%, #1e1b4b);
      position: relative;
      overflow: hidden;
      animation: float .4s ease both;
    }

    .balance-card p {
      color: rgba(255,255,255,.75);
      font-size: 15px;
      margin-bottom: 12px;
    }

    .balance-card h2 {
      font-size: clamp(44px, 6vw, 70px);
      letter-spacing: -0.07em;
      margin-bottom: 28px;
    }

    .account-number {
      color: rgba(255,255,255,.75);
      letter-spacing: .16em;
      font-size: 13px;
    }

    .quick-grid {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .quick {
      padding: 20px;
      border-radius: 22px;
      background: rgba(15,23,42,.70);
      border: 1px solid rgba(255,255,255,.10);
    }

    .quick span {
      color: #94a3b8;
      font-size: 13px;
    }

    .quick strong {
      display: block;
      margin-top: 8px;
      font-size: 22px;
    }

    .section-title {
      font-size: 22px;
      letter-spacing: -0.04em;
      margin-bottom: 18px;
    }

    label {
      display: block;
      color: #cbd5e1;
      font-size: 13px;
      margin-bottom: 8px;
      font-weight: 700;
    }

    input {
      width: 100%;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(2, 6, 23, .58);
      color: white;
      border-radius: 16px;
      padding: 15px 16px;
      outline: none;
      font-size: 15px;
      transition: .2s;
      margin-bottom: 14px;
    }

    input:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 4px rgba(56,189,248,.12);
    }

    button.action {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 15px 18px;
      background: linear-gradient(135deg, #38bdf8, #2563eb);
      color: white;
      font-weight: 850;
      cursor: pointer;
      transition: .2s;
      font-size: 15px;
      box-shadow: 0 18px 42px rgba(37,99,235,.28);
    }

    button.action:hover {
      transform: translateY(-2px);
    }

    #history {
      list-style: none;
      display: grid;
      gap: 12px;
      max-height: 390px;
      overflow-y: auto;
      padding-right: 4px;
    }

    #history li {
      padding: 15px;
      border-radius: 18px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      color: #dbeafe;
      font-size: 14px;
    }

    @keyframes enter {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes float {
      from { opacity: 0; transform: translateY(16px) scale(.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .quick-grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">
        <div class="logo-mark">WB</div>
        WebBank
      </div>

      <nav class="menu">
        <a href="dashboard.html" class="active">Panel główny</a>
        <a href="#">Przelewy</a>
        <a href="#">Historia</a>
        <a href="#">Ustawienia</a>
        <button onclick="logout()">Wyloguj</button>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>Panel klienta</h1>
          <p style="color:#94a3b8; margin-top:8px;">Zarządzaj swoim kontem i środkami.</p>
        </div>

        <div class="user-pill" id="userEmail">Ładowanie konta...</div>
      </header>

      <section class="grid">
        <div>
          <div class="card balance-card">
            <p>Aktualne saldo</p>
            <h2><span id="balance">0</span> zł</h2>
           <div class="account-number">
  Numer konta: <span id="accountNumber">Ładowanie...</span>
</div>
          </div>

          <div class="quick-grid">
            <div class="quick">
              <span>Status konta</span>
              <strong>Aktywne</strong>
            </div>

            <div class="quick">
              <span>Typ konta</span>
              <strong>Online</strong>
            </div>

            <div class="quick">
              <span>Waluta</span>
              <strong>PLN</strong>
            </div>
          </div>
        </div>

        <aside class="card">
          <h2 class="section-title">Szybka wpłata</h2>

          <label>Kwota</label>
          <input id="depositAmount" type="number" placeholder="np. 250">

          <button class="action" onclick="deposit()">Dodaj środki</button>

          <h2 class="section-title" style="margin-top:28px;">Ostatnie operacje</h2>
          <ul id="history"></ul>
        </aside>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
